<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Telematik Support Chat - Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background: #eef1f5; display: flex; align-items: center; justify-content: center; height: 100vh; }

  .page-hint { position: absolute; top: 24px; left: 24px; color: #8a93a3; font-size: 14px; max-width: 320px; }

  .chat-widget {
    width: 380px; height: 600px; background: #fff; border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden;
  }
  .chat-header {
    background: linear-gradient(135deg, #1f4e8c, #2c6fc9); color: white; padding: 18px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .chat-header .avatar {
    width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .chat-header .info h3 { font-size: 15px; font-weight: 600; }
  .chat-header .info span { font-size: 12px; opacity: 0.85; }
  .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 5px; }

  .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f7f9fc; }

  .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.4; }
  .msg.bot { background: white; align-self: flex-start; border: 1px solid #e5e9f0; color: #1a1a1a; }
  .msg.user { background: #1f4e8c; color: white; align-self: flex-end; }
  .msg.typing { background: white; align-self: flex-start; border: 1px solid #e5e9f0; padding: 12px 16px; }
  .dot-flash { display: inline-flex; gap: 4px; }
  .dot-flash span { width: 6px; height: 6px; background: #9aa5b5; border-radius: 50%; animation: blink 1.2s infinite; }
  .dot-flash span:nth-child(2) { animation-delay: 0.2s; }
  .dot-flash span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

  .quick-replies { display: flex; gap: 8px; padding: 0 16px 12px; flex-wrap: wrap; }
  .quick-reply {
    background: #eef3fb; color: #1f4e8c; border: 1px solid #d6e3f5; border-radius: 20px;
    padding: 6px 14px; font-size: 13px; cursor: pointer; transition: background 0.15s;
  }
  .quick-reply:hover { background: #dde9fa; }

  .chat-input { display: flex; padding: 14px; gap: 10px; border-top: 1px solid #e5e9f0; }
  .chat-input input {
    flex: 1; border: 1px solid #dde2ea; border-radius: 24px; padding: 10px 16px; font-size: 14px; outline: none;
  }
  .chat-input input:focus { border-color: #1f4e8c; }
  .chat-input button {
    background: #1f4e8c; color: white; border: none; border-radius: 50%; width: 40px; height: 40px;
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  }
  .chat-input button:hover { background: #163a6b; }
</style>
</head>
<body>

<div class="page-hint">👈 Это демо-виджет логистического чат-бота. Цель: показать как работает промпт-инжиниринг на практике + структура простого AI-чатбота.</div>

<div class="chat-widget">
  <div class="chat-header">
    <div class="avatar">🚚</div>
    <div class="info">
      <h3>Telematik Support</h3>
      <span><span class="status-dot"></span>Online</span>
    </div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="msg bot">Guten Tag! Ich bin Ihr virtueller Assistent für Sendungsverfolgung. Wie kann ich Ihnen helfen?</div>
  </div>

  <div class="quick-replies">
    <div class="quick-reply" onclick="sendQuickReply('Sendung verfolgen')">📦 Sendung verfolgen</div>
    <div class="quick-reply" onclick="sendQuickReply('Status der Lieferung')">🚦 Lieferstatus</div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Schreiben Sie Ihre Nachricht..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// ============================================
// TESTDATEN — In Produktion: echte API/Datenbank statt diesem Objekt
// ============================================
const ORDERS_DB = {
  "12345": { status: "Unterwegs", location: "Frankfurt am Main, DE", eta: "20.06.2026", carrier: "Telematik Express" },
  "67890": { status: "Zugestellt", location: "Empfänger - Berlin", eta: "Geliefert am 17.06.2026", carrier: "Telematik Express" },
  "11111": { status: "Verzögert", location: "Zoll - Hamburg Hafen", eta: "Wird aktualisiert", carrier: "Telematik Express" }
};

// ============================================
// SYSTEM PROMPT — Hier passiert das Prompt Engineering
// ============================================
const SYSTEM_PROMPT = `Du bist ein Kundensupport-Assistent der Logistikfirma Telematik GmbH.

DEINE AUFGABE:
Hilf Kunden beim Verfolgen von Sendungen und beim Erhalt von Lieferstatus-Informationen.

REGELN:
1. Antworte NUR auf Fragen zu Lieferungen, Sendungsverfolgung und Bestellstatus
2. Wenn der Kunde eine Bestellnummer angibt, nutze die Funktion track_order um aktuelle Daten zu erhalten
3. Wenn keine Bestellnummer vorhanden ist, frage höflich danach
4. Bei Fragen außerhalb des Themas Lieferung: weise höflich darauf hin, dass du nur bei Lieferfragen helfen kannst
5. Antworte kurz, klar und professionell - keine unnötigen Füllwörter
6. Wenn der Status "Verzögert" ist: entschuldige dich und biete den Support-Kontakt an

TON: professionell, freundlich, sachlich

BEISPIELE:
Kunde: "Wo ist meine Sendung?"
Du: "Können Sie mir bitte Ihre Bestellnummer mitteilen, damit ich den Lieferstatus prüfen kann?"

Kunde: "Wie ist das Wetter in Berlin?"
Du: "Ich kann nur bei Fragen zu Ihren Bestellungen und Lieferungen helfen. Haben Sie eine Bestellnummer für mich?"`;

// ============================================
// SIMULIERTE AI-ANTWORT (Demo ohne echten API-Call)
// In Produktion: echter Call an Vertex AI / Gemini mit SYSTEM_PROMPT + User-Message
// ============================================
function simulateAIResponse(userText) {
  const lower = userText.toLowerCase();
  const orderMatch = userText.match(/\b\d{5}\b/);

  if (orderMatch) {
    const orderId = orderMatch[0];
    const order = ORDERS_DB[orderId];
    if (order) {
      if (order.status === "Verzögert") {
        return `Ihre Sendung ${orderId} hat aktuell den Status "${order.status}" (Standort: ${order.location}). Es tut mir leid für die Verzögerung. Für weitere Details kontaktieren Sie bitte unseren Support unter support@telematik.de`;
      }
      return `Ihre Sendung ${orderId}:\n📍 Status: ${order.status}\n📌 Standort: ${order.location}\n📅 Voraussichtlich: ${order.eta}\n🚚 Spediteur: ${order.carrier}`;
    }
    return `Ich konnte keine Sendung mit der Nummer ${orderId} finden. Bitte überprüfen Sie die Nummer noch einmal.`;
  }

  if (lower.includes("sendung") || lower.includes("verfolg") || lower.includes("status") || lower.includes("lieferung") || lower.includes("paket")) {
    return "Gerne helfe ich Ihnen weiter! Können Sie mir bitte Ihre Bestellnummer mitteilen? (z.B. 12345)";
  }

  if (lower.includes("danke") || lower.includes("super") || lower.includes("toll")) {
    return "Gerne! Kann ich Ihnen noch mit etwas anderem helfen?";
  }

  return "Ich kann Ihnen nur bei Fragen zu Sendungsverfolgung und Lieferstatus helfen. Haben Sie eine Bestellnummer für mich?";
}

function appendMessage(text, sender) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="dot-flash"><span></span><span></span><span></span></div>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function sendQuickReply(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  appendMessage(text, 'user');
  input.value = '';
  showTyping();

  // Simuliert Netzwerk-Delay wie bei echtem API-Call
  setTimeout(() => {
    removeTyping();
    const response = simulateAIResponse(text);
    appendMessage(response, 'bot');
  }, 700 + Math.random() * 600);
}
</script>
</body>
</html>
